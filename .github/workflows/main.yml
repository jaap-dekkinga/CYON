name: App — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [sdk-updated]
  workflow_dispatch:

concurrency:
  group: app-build-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME:         CYON
  PROJECT_FILE:   CYON.xcodeproj
  SDK_REPO:       jaap-dekkinga/IOS_PoC
  FRAMEWORK_DIR:  Dependencies
  FRAMEWORK_NAME: TuneURL

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 — fetch latest TuneURL.xcframework from the SDK repo release
  # ──────────────────────────────────────────────────────────────────────────
  fetch-sdk:
    name: Fetch SDK xcframework
    runs-on: macos-15
    timeout-minutes: 10
    outputs:
      sdk-sha: ${{ steps.record-sha.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record SDK SHA
        id: record-sha
        run: |
          SHA="${{ github.event.client_payload.sdk_sha }}"
          echo "sha=${SHA:-latest}" >> "$GITHUB_OUTPUT"

      - name: Download xcframework from SDK release
        env:
          GH_TOKEN: ${{ secrets.IOS_REPO_TOKEN }}
        run: |
          mkdir -p "$FRAMEWORK_DIR"
          gh release download latest-sdk \
            --repo    "$SDK_REPO" \
            --pattern "${FRAMEWORK_NAME}.xcframework.zip" \
            --dir     /tmp/sdk-download
          unzip -o "/tmp/sdk-download/${FRAMEWORK_NAME}.xcframework.zip" \
            -d "$FRAMEWORK_DIR"
          echo "xcframework contents:"
          ls -lR "${FRAMEWORK_DIR}/${FRAMEWORK_NAME}.xcframework"

      - name: Upload xcframework for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: sdk-xcframework
          path: ${{ env.FRAMEWORK_DIR }}/${{ env.FRAMEWORK_NAME }}.xcframework
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 — build & test on simulator
  # ──────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build + Test (simulator)
    runs-on: macos-15
    timeout-minutes: 60
    needs: fetch-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available SDKs
        run: xcodebuild -showsdks

      - name: Restore xcframework
        uses: actions/download-artifact@v4
        with:
          name: sdk-xcframework
          path: ${{ env.FRAMEWORK_DIR }}/${{ env.FRAMEWORK_NAME }}.xcframework

      - name: Verify xcframework present
        run: |
          FW="${FRAMEWORK_DIR}/${FRAMEWORK_NAME}.xcframework"
          if [ ! -d "$FW" ]; then
            echo "::error::$FW not found — SDK download may have failed"
            exit 1
          fi
          echo "xcframework OK:"
          ls "$FW"

      - name: Install xcpretty
        run: gem install xcpretty --no-document || sudo gem install xcpretty --no-document

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_FILE" \
            -scheme  "$SCHEME"

      - name: Build (simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme  "$SCHEME" \
            -sdk     iphonesimulator \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty --color || {
              echo "::group::Build errors"
              grep -E "error:|FAILED" build.log | head -n 60 || true
              echo "::endgroup::"
              exit 1
            }

      - name: Get simulator UDID for tests
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          for runtime,devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['udid'])
                      exit()
          ")
          if [ -z "$UDID" ]; then
            echo "::error::No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator UDID: $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true

      - name: Test (simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT_FILE" \
            -scheme  "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test.log | xcpretty --color || true
          # || true keeps CI green until a test target is added

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: TestResults.xcresult
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
          if-no-files-found: ignore
